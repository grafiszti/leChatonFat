services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./models:/models
      - llama_cache:/root/.cache/llama.cpp

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

#    command: >
#      -m /models/Qwopus3.5-9B-coder-Exp-Q4_K_M.gguf
#      --host 0.0.0.0
#      --port 8080
#      --ctx-size 32768
#      --n-gpu-layers 99

    command: >
      -m /models/Qwopus3.5-9B-coder-Exp-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 16384
      --n-gpu-layers 99
      --flash-attn on
      --threads 12

volumes:
  llama_cache: